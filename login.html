<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VARAVI Global | Access Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #FFD700;
            --deep-black: #06080f;
            --pure-white: #ffffff;
            --grey: #888888;
            --font-main: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--deep-black);
            color: var(--pure-white);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- LOGIN MONOLITH --- */
        .login-container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            padding: 40px;
        }

        .login-container h1 {
            font-size: 1.8rem;
            letter-spacing: 8px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 300;
            margin-bottom: 15px;
        }

        .login-container p {
            font-size: 0.85rem;
            color: var(--grey);
            letter-spacing: 1px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* --- FORM ELEMENTS --- */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.65rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.1);
            padding: 15px;
            color: #fff;
            font-family: var(--font-main);
            font-size: 0.9rem;
            outline: none;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .input-group input:focus {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.02);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }

        /* --- ACTION BUTTON --- */
        .btn-login {
            width: 100%;
            background: var(--gold);
            color: var(--deep-black);
            border: 1px solid var(--gold);
            padding: 16px;
            font-family: var(--font-main);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .btn-login:hover {
            background: transparent;
            color: var(--gold);
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.15);
        }

        /* --- FOOTER NAV --- */
        .footer-nav {
            margin-top: 30px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--grey);
        }

        .footer-nav a {
            color: var(--gold);
            text-decoration: none;
            margin-left: 5px;
            font-weight: 700;
            transition: 0.3s;
        }

        .footer-nav a:hover {
            text-shadow: 0 0 10px var(--gold);
        }

        /* PC GOLDEN DOT */
        #cursor-dot {
            position: fixed; width: 10px; height: 10px; background: var(--gold);
            border-radius: 50%; pointer-events: none; z-index: 10001;
            box-shadow: 0 0 20px var(--gold); transform: translate(-50%, -50%); opacity: 0;
        }

        @media (max-width: 768px) {
            #cursor-dot { display: none; }
            .login-container { padding: 20px; }
            .login-container h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>

    <div class="login-container">
        <h1>Access Protocol</h1>
        <p>Re-establish connection to the VARAVI Nerve Center. Authorization required for strategic engagement.</p>
        
        <form action="#">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@firm.com" required>
            </div>
            
            <div class="input-group">
                <label>Access Code / Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login">LOGIN</button>
        </form>

        <div class="footer-nav">
            NEW TO THE EMPIRE? <a href="get-started.html">CREATE ACCOUNT</a>
        </div>
    </div>

    <script>
        // Custom Cursor Logic
        const dot = document.getElementById('cursor-dot');
        document.addEventListener('mousemove', (e) => {
            dot.style.opacity = "1";
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
