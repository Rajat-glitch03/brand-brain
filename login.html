<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VARAVI Global | Imperial Login</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #FFD700;
            --deep-black: #06080f;
            --pure-white: #ffffff;
            --grey: #888888;
            --font-main: 'DM Sans', sans-serif;
        }

        /* --- IMPERIAL SCROLLBAR --- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--deep-black); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--deep-black);
            color: var(--pure-white);
            font-family: var(--font-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0; width: 100%; height: 100px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 6%;
            background: rgba(6, 8, 15, 0.95);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            z-index: 1000;
        }

        .nav-logo { height: 32px; transform: scale(3.0); transform-origin: left center; }

        .nav-center { display: flex; gap: 50px; }
        
        .nav-tab {
            text-decoration: none; color: var(--pure-white);
            font-size: 0.75rem; letter-spacing: 4px;
            opacity: 0.5; transition: 0.4s;
            position: relative; padding: 8px 0;
        }
        .nav-tab:hover { opacity: 1; color: var(--gold); }

        /* BOLD GOLD UNDERLINE */
        .nav-tab::after {
            content: ''; position: absolute; bottom: 0; left: 50%;
            width: 0; height: 3px; background: var(--gold);
            box-shadow: 0 0 20px 2px var(--gold);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            transform: translateX(-50%);
        }
        .nav-tab:hover::after { width: 100%; }

        .nav-right { display: flex; align-items: center; gap: 25px; }

        .menu-toggle {
            display: none; flex-direction: column; justify-content: space-between;
            width: 24px; height: 16px; cursor: pointer; z-index: 2000; flex-shrink: 0;
        }
        .menu-toggle span { display: block; width: 100%; height: 2px; background: var(--gold); transition: 0.4s; }

        /* --- LOGIN SECTION --- */
        .login-hero {
            padding: 180px 10% 40px;
            text-align: center;
        }
        .login-hero h1 {
            font-size: 2.5rem; font-weight: 200; letter-spacing: 8px;
            text-transform: uppercase; color: var(--gold); margin-bottom: 15px;
        }
        .login-hero p {
            font-size: 0.9rem; opacity: 0.6; letter-spacing: 2px;
            max-width: 500px; margin: 0 auto;
        }

        .form-container {
            width: 90%; max-width: 450px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 215, 0, 0.1);
            padding: 50px; margin: 0 auto 100px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 25px; }
        .input-group label {
            display: block; font-size: 0.65rem; color: var(--gold);
            text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px;
        }

        .input-group input {
            width: 100%; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px; color: #fff; font-family: var(--font-main);
            outline: none; transition: 0.4s;
        }
        .input-group input:focus {
            border-color: var(--gold); background: rgba(255, 215, 0, 0.02);
        }

        .btn-login {
            background: var(--gold); color: var(--deep-black);
            border: 1px solid var(--gold);
            padding: 14px; width: 100%;
            font-family: var(--font-main); font-size: 0.75rem;
            font-weight: 700; letter-spacing: 3px;
            text-transform: uppercase; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            margin-top: 10px;
        }
        .btn-login:hover {
            background: transparent; color: var(--gold);
            transform: scale(1.03); box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .switch-portal {
            text-align: center; margin-top: 30px;
            font-size: 0.7rem; letter-spacing: 2px; color: var(--grey);
        }
        .switch-portal a {
            color: var(--gold); text-decoration: none; font-weight: 700;
            margin-left: 5px; transition: 0.3s;
        }
        .switch-portal a:hover { text-shadow: 0 0 10px var(--gold); }

        /* PC GOLDEN DOT */
        #cursor-dot {
            position: fixed; width: 10px; height: 10px; background: var(--gold);
            border-radius: 50%; pointer-events: none; z-index: 10001;
            box-shadow: 0 0 20px var(--gold); transform: translate(-50%, -50%); opacity: 0;
        }

        /* --- MOBILE --- */
        @media (max-width: 1024px) {
            nav { height: 80px; padding: 0 5%; }
            .nav-logo { transform: scale(3.5); margin-left: 20px; }
            .nav-center {
                position: fixed; top: 0; right: -100%; width: 100%; height: 100vh;
                background: #06080f; flex-direction: column; justify-content: center;
                align-items: center; gap: 40px; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); z-index: 1500;
            }
            .nav-center.open { right: 0; }
            .menu-toggle { display: flex; }
            .login-hero h1 { font-size: 1.8rem; }
            .form-container { padding: 40px 25px; }
            #cursor-dot { display: none; }

            .menu-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
            .menu-toggle.open span:nth-child(2) { opacity: 0; }
            .menu-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>

    <nav>
        <div class="nav-left">
            <img src="logo.png" class="nav-logo" alt="VARAVI">
        </div>
        <div class="nav-center" id="navDrawer">
            <a href="index.html" class="nav-tab">OVERVIEW</a>
            <a href="intelligence.html" class="nav-tab">INTELLIGENCE</a>
            <a href="contact.html" class="nav-tab">CONTACT US</a>
        </div>
        <div class="nav-right">
            <div class="menu-toggle" id="menuToggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="login-hero">
        <h1>Welcome Back</h1>
        <p>Authenticate your credentials to access the Quans Strategic Engine.</p>
    </div>

    <div class="form-container">
        <form action="#">
            <div class="input-group">
                <label>Imperial Email</label>
                <input type="email" placeholder="name@firm.com" required>
            </div>
            <div class="input-group">
                <label>Security Key (Password)</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">AUTHENTICATE</button>
        </form>

        <div class="switch-portal">
            NEW TO THE EMPIRE? <a href="get-started.html">CREATE ACCOUNT</a>
        </div>
    </div>

    <script>
        const menuBtn = document.getElementById('menuToggle');
        const drawer = document.getElementById('navDrawer');

        menuBtn.onclick = () => {
            menuBtn.classList.toggle('open');
            drawer.classList.toggle('open');
            document.body.style.overflow = drawer.classList.contains('open') ? 'hidden' : 'auto';
        };

        const dot = document.getElementById('cursor-dot');
        document.addEventListener('mousemove', (e) => {
            dot.style.opacity = "1";
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('.nav-tab').forEach(n => n.addEventListener('click', () => {
            menuBtn.classList.remove('open');
            drawer.classList.remove('open');
            document.body.style.overflow = 'auto';
        }));
    </script>
</body>
</html>
