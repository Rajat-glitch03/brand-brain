<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VARAVI Global | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #FFD700;
            --deep-black: #06080f;
            --pure-white: #ffffff;
            --grey: #888888;
            --font-main: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--deep-black);
            color: var(--pure-white);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .auth-container {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 215, 0, 0.1);
            padding: 50px 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 5px;
            font-weight: 500;
            color: var(--gold);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.85rem;
            opacity: 0.6;
            letter-spacing: 1px;
            margin-bottom: 40px;
            font-weight: 200;
        }

        .btn-google {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-family: var(--font-main);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.4s;
            margin-bottom: 30px;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--gold);
        }

        .btn-google img { width: 18px; height: 18px; }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0.3;
        }

        .divider-text {
            padding: 0 15px;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--gold);
            font-weight: 700;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.65rem;
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            color: #fff;
            font-family: var(--font-main);
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.02);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: var(--deep-black);
            border: 1px solid var(--gold);
            font-family: var(--font-main);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            margin-top: 10px;
        }

        .btn-login:hover {
            background: transparent;
            color: var(--gold);
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        .auth-footer {
            margin-top: 30px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: var(--grey);
        }

        .auth-footer a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
            transition: 0.3s;
        }

        #cursor-dot {
            position: fixed; width: 10px; height: 10px; background: var(--gold);
            border-radius: 50%; pointer-events: none; z-index: 10001;
            box-shadow: 0 0 20px var(--gold); transform: translate(-50%, -50%); opacity: 0;
        }

        @media (max-width: 768px) {
            .auth-container { padding: 40px 25px; border: none; background: transparent; }
            #cursor-dot { display: none; }
        }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>

    <div class="auth-container">
        <h1>Welcome Back</h1>
        <p class="subtitle">Authenticate your credentials to access the VARAVI Global.</p>

        <!-- Google button triggers global function -->
        <button class="btn-google" onclick="window.signInWithGoogle()">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
            LOGIN WITH GOOGLE
        </button>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">OR</div>
            <div class="divider-line"></div>
        </div>

        <form id="loginForm">
    <div class="input-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="name@firm.com" required>
    </div>
    
    <div class="input-group">
        <label>Password</label>
        <div style="position: relative; display: flex; align-items: center;">
            <input type="password" id="loginPassword" placeholder="••••••••" required>
            <span id="eyeBtn" style="position: absolute; right: 15px; cursor: pointer; color: var(--gold); font-size: 1.2rem; user-select: none;">👁️</span>
        </div>
        <span id="loginError" style="color: var(--gold); font-size: 0.65rem; letter-spacing: 1px; margin-top: 8px; display: none; text-transform: uppercase; opacity: 0.8;">
            * Security Protocol: Minimum 6 characters required.
        </span>
    </div>
    
    <button type="submit" class="btn-login">LOGIN</button>
</form>
        <div class="auth-footer">
            New to VARAVI Global? <a href="get-started.html">CREATE AN ACCOUNT</a>
        </div>
    </div>

    <!-- CRITICAL: MUST BE TYPE="MODULE" -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            // PASTE YOUR CONFIG HERE
            apiKey: "AIzaSyCb7mIUHmJuM9TN40YN9ooAa-CTm-gFDrc",
  authDomain: "varavi-global-8efa1.firebaseapp.com",
  projectId: "varavi-global-8efa1",
  storageBucket: "varavi-global-8efa1.firebasestorage.app",
  messagingSenderId: "448204871009",
  appId: "1:448204871009:web:6fe30cb2430c2e4d6e6120",
  measurementId: "G-SEGDLESNC1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- CURSOR LOGIC ---
        const dot = document.getElementById('cursor-dot');
        document.addEventListener('mousemove', (e) => {
            if(dot) {
                dot.style.opacity = "1";
                dot.style.left = e.clientX + 'px';
                dot.style.top = e.clientY + 'px';
            }
        });

        // --- EYE LOGIC ---
        const eyeBtn = document.getElementById('eyeBtn');
        const passInput = document.getElementById('loginPassword');

        if (eyeBtn && passInput) {
            eyeBtn.addEventListener('click', () => {
                const isPass = passInput.type === 'password';
                passInput.type = isPass ? 'text' : 'password';
                eyeBtn.textContent = isPass ? '🔒' : '👁️';
            });
        }

        // --- GOOGLE LOGIN ---
        window.signInWithGoogle = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "intelligence.html";
            } catch (error) {
                alert("Auth Failed: " + error.message);
            }
        };

        // --- MANUAL LOGIN & 6-CHAR CHECK ---
        // --- MANUAL LOGIN & INLINE SECURITY CHECK ---
const loginForm = document.getElementById('loginForm');
const loginError = document.getElementById('loginError');

if (loginForm) {
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('loginEmail').value;
        const password = passInput.value;

        // Check if password is too short
        if (password.length < 6) {
            loginError.style.display = 'block'; // Show golden warning
            loginError.textContent = "* Security Protocol: Minimum 6 characters required.";
            return; 
        } else {
            loginError.style.display = 'none'; // Hide if fixed
        }

        try {
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = "intelligence.html";
        } catch (error) {
            // Also use the inline warning for wrong passwords!
            loginError.style.display = 'block';
            if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                loginError.textContent = "* Access Denied: Invalid Credentials.";
            } else {
                loginError.textContent = "* System Error: Unable to authenticate.";
            }
        }
    });
}
    </script>
</body>
</html>
