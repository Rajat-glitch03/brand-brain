<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VARAVI Global | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #FFD700;
            --deep-black: #06080f;
            --pure-white: #ffffff;
            --grey: #888888;
            --font-main: 'DM Sans', sans-serif;
        }

        /* --- EXCLUSIVE GOLDEN SCROLLBAR --- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--deep-black); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--deep-black);
            color: var(--pure-white);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* --- THE MASTER MONOLITH BOX --- */
        .gateway-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 215, 0, 0.1);
            padding: 50px 40px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* --- ELEVATED INNER BOX (BUTTON STYLE) --- */
        .elevated-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 215, 0, 0.1);
            padding: 30px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .elevated-box:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.03);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.1);
        }

        .elevated-box h3 {
            color: var(--gold);
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .elevated-box p {
            font-size: 0.85rem;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        .btn-google {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-family: var(--font-main);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.4s;
            margin-bottom: 30px;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--gold);
        }

        .btn-google img { width: 18px; height: 18px; }

        /* --- DECORATIVE ELEMENTS --- */
        .golden-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 30px 0;
            opacity: 0.5;
        }

        .instruction-text {
            font-size: 0.8rem;
            opacity: 0.5;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .main-heading {
            font-size: 1.2rem;
            letter-spacing: 5px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 35px;
        }

        /* --- FORM SECTION --- */
        .form-box {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            text-align: left;
        }

        .google-btn {
            width: 100%;
            background: transparent;
            color: var(--pure-white);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px;
            font-family: var(--font-main);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            margin-bottom: 25px;
        }

        .google-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(255, 215, 0, 0.02);
        }

        /* OR Separator logic */
        .or-separator {
            display: flex;
            align-items: center;
            text-align: center;
            margin-bottom: 25px;
        }

        .or-separator::before, .or-separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }

        .or-separator span {
            padding: 0 15px;
            font-size: 0.65rem;
            color: var(--gold);
            font-weight: 700;
        }

        /* THE IMPERIAL CREATE ACCOUNT BUTTON */
        .btn-create-acc {
            width: 100%;
            background: var(--gold);
            color: var(--deep-black);
            border: 1px solid var(--gold);
            padding: 14px;
            font-family: var(--font-main);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            margin-top: 10px;
            outline: none;
            position: relative;
            overflow: hidden;
        }

        .btn-create-acc:hover {
            background: var(--deep-black);
            color: var(--gold);
            transform: scale(1.05); /* The Sovereign Zoom */
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

/* Optional: Subtle pulse effect to draw the eye */
        .btn-create-acc:active {
            transform: scale(0.98);
        }

        /* INPUT FIELDS */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--grey);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            color: white;
            font-family: var(--font-main);
            outline: none;
            transition: 0.4s;
        }

        .input-group input:focus {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.02);
        }

        .footer-link {
            display: block;
            margin-top: 30px;
            font-size: 0.7rem;
            color: var(--grey);
            letter-spacing: 1px;
            text-align: center;
        }

        .footer-link a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
            transition: 0.3s;
        }

        .footer-link a:hover {
            text-shadow: 0 0 10px var(--gold);
        }

        /* --- PC CURSOR DOT --- */
        #cursor-dot {
            position: fixed; width: 10px; height: 10px;
            background: var(--gold); border-radius: 50%;
            pointer-events: none; z-index: 10001;
            box-shadow: 0 0 15px var(--gold);
            transform: translate(-50%, -50%);
            opacity: 0; transition: opacity 0.5s ease;
        }

        @media (max-width: 768px) {
            #cursor-dot { display: none !important; }
            .gateway-container { padding: 40px 20px; }
            .form-box { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>

    <div class="gateway-container">
    
        <p class="instruction-text">To access VARAVI Global</p>
        <h2 class="main-heading">CREATE AN ACCOUNT</h2>

        <div class="form-box">
            <button class="btn-google"><img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">SIGNIN WITH GOOGLE</button>

            <div class="or-separator">
                <span>OR</span>
            </div>

            <div class="input-group">
                <label>Email address<span>*</span></label>
                <input type="email" placeholder="name@firm.com" required>
            </div>

            <div class="input-group">
                <label>Password<span>*</span></label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button class="btn-create-acc">
    CREATE ACCOUNT
</button>
        </div>

        <p class="footer-link">Already have an account? <a href="#" onclick="location.href='login.html'">LOGIN</a></p>
    </div>

    <script>
        // --- GOLDEN DOT LOGIC ---
        const dot = document.getElementById('cursor-dot');
        let initialMove = false;

        document.addEventListener('mousemove', (e) => {
            if (!initialMove) {
                dot.style.opacity = "1";
                initialMove = true;
            }
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
