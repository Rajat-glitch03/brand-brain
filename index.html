<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARAVI Global | 2026 Elite AI</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .slide { height: 100vh; display: flex; align-items: center; justify-content: center; transition: 0.8s ease-in-out; }
        .luxury-card { background: var(--glass); padding: 40px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2); width: 400px; backdrop-filter: blur(10px); text-align: center; }
        .gold-text { color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        .luxury-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--gold); color: white; padding: 10px 0; margin: 20px 0; outline: none; font-size: 1rem; }
        .location-dropdown { position: absolute; background: #111; border: 1px solid var(--gold); border-top: none; width: 100%; z-index: 100; display: none; text-align: left; border-radius: 0 0 10px 10px; }
        .location-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #222; }
        .location-item:hover { background: rgba(212, 175, 55, 0.1); }
        #slide2 { display: none; flex-direction: column; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; width: 80%; max-width: 900px; margin: 0 auto; }
        .msg { margin-bottom: 20px; line-height: 1.6; }
        .laura { color: #e0e0e0; }
        .user { color: var(--gold); text-align: right; font-weight: bold; }
        .gold-btn { background: var(--gold); color: black; border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<!-- SLIDE 1: ACCESS -->
<div id="slide1" class="slide">
    <div class="luxury-card">
        <h1 class="gold-text">VARAVI GLOBAL</h1>
        <p>Verified Elite Access Only</p>
        
        <!-- Google Sign-In -->
        <div id="g_id_onload" data-client_id="623414724020-ase8c96uk8pr6ln54rral0cf5vq7dn41.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin" data-type="standard" data-theme="outline" data-size="large"></div>

        <div id="postLogin" style="display:none;">
            <input type="text" id="userEmail" class="luxury-input" readonly>
            <div style="position: relative;">
                <input type="text" id="userCity" class="luxury-input" placeholder="Enter Global Hub..." autocomplete="off">
                <div id="locationDropdown" class="location-dropdown"></div>
            </div>
            <button onclick="startConsultation()" class="gold-btn">INITIALIZE LAURA</button>
        </div>
    </div>
</div>

<!-- SLIDE 2: CHAT -->
<div id="slide2" class="slide">
    <div id="chat-window"></div>
    <div style="padding: 20px; background: #000; width: 100%; display: flex; justify-content: center;">
        <input type="text" id="userInput" class="luxury-input" style="width: 60%;" placeholder="Command Laura...">
        <button onclick="sendMessage()" class="gold-btn" style="margin-top: 0; margin-left: 10px;">SEND</button>
    </div>
</div>

<script>
    let currentUser = {};

    function parseJwt(token) {
        return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    }

    function handleCredentialResponse(response) {
        const payload = parseJwt(response.credential);
        if (!payload.email.endsWith('@gmail.com')) return alert("Use a personal Gmail account.");
        
        currentUser = { name: payload.name, email: payload.email };
        document.querySelector('.g_id_signin').style.display = 'none';
        document.getElementById('postLogin').style.display = 'block';
        document.getElementById('userEmail').value = payload.email;
    }

    // Location Autocomplete
    const cityInput = document.getElementById('userCity');
    const dropdown = document.getElementById('locationDropdown');
    cityInput.addEventListener('input', async () => {
        if (cityInput.value.length < 3) return dropdown.style.display = 'none';
        const res = await fetch(`https://photon.komoot.io/api/?q=${cityInput.value}&limit=5`);
        const data = await res.json();
        dropdown.innerHTML = data.features.map(f => `
            <div class="location-item" onclick="selectCity('${f.properties.name}, ${f.properties.country}')">
                ${f.properties.name}, ${f.properties.country}
            </div>`).join('');
        dropdown.style.display = 'block';
    });

    function selectCity(val) {
        cityInput.value = val;
        dropdown.style.display = 'none';
    }

    function startConsultation() {
        if (!cityInput.value) return alert("Select a location.");
        currentUser.city = cityInput.value;
        currentUser.tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        document.getElementById('slide1').style.display = 'none';
        document.getElementById('slide2').style.display = 'flex';
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-window');
        const msg = input.value;
        if (!msg) return;

        chat.innerHTML += `<div class="user">${msg}</div>`;
        input.value = '';

        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg, userData: currentUser })
        });
        const data = await response.json();
        chat.innerHTML += `<div class="laura">${data.reply.replace(/\n/g, '<br>')}</div>`;
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
