<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARAVI Global | The Triad</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,400;9..40,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #FFD700;
            --deep-black: #06080f;
            --pure-white: #ffffff;
            --font-main: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%; width: 100%;
            background-color: var(--deep-black);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Subliminal Logo Background - Scaled for Mobile */
        .bg-logo {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 600px;
            opacity: 0.1; pointer-events: none; z-index: 0;
        }

        /* The Moving Golden Dot - Hidden until movement */
        #cursor-dot {
            position: fixed; width: 10px; height: 10px;
            background-color: var(--gold); border-radius: 50%;
            pointer-events: none; z-index: 9999;
            box-shadow: 0 0 15px var(--gold);
            transform: translate(-50%, -50%);
            opacity: 0; /* Hidden initially */
            transition: opacity 0.5s ease;
        }

        /* Content Container - Responsive Padding */
        .content {
            text-align: center; z-index: 10;
            width: 90%; max-width: 900px;
            padding: 20px;
        }

        .slogan-top {
            color: var(--gold); font-weight: 700;
            letter-spacing: 5px; text-transform: uppercase;
            font-size: 0.65rem; margin-bottom: 20px;
        }

        /* Responsive Header */
        .main-header {
            font-size: clamp(2.5rem, 8vw, 4.5rem); 
            font-weight: 200;
            color: var(--pure-white); line-height: 1.1;
            margin-bottom: 30px; letter-spacing: -1px;
        }

        /* Responsive Triad Pillars */
        .triad-labels {
            display: flex; 
            justify-content: center; 
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap; /* Allows stacking on small screens */
        }

        .pillar {
            color: var(--pure-white); font-size: 0.6rem;
            letter-spacing: 2px; text-transform: uppercase;
            opacity: 0.4; border-left: 1px solid var(--gold);
            padding-left: 10px; transition: 0.5s;
            white-space: nowrap;
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            .triad-labels { flex-direction: column; align-items: center; gap: 15px; }
            .pillar { border-left: none; border-bottom: 1px solid var(--gold); padding: 0 0 5px 0; width: fit-content; }
            #cursor-dot { display: none; } /* Custom cursors don't work on touch screens */
        }

        .activate-btn {
            background: var(--gold); color: var(--deep-black);
            border: none; padding: 20px 45px;
            font-family: var(--font-main); font-weight: 700;
            letter-spacing: 4px; text-transform: uppercase;
            font-size: 0.75rem; cursor: pointer;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            width: 100%; max-width: 320px; /* Full width on mobile, capped on desktop */
        }

        .activate-btn:hover {
            letter-spacing: 6px; transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.2);
        }

    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <img src="logo1.png" class="bg-logo">

    <div class="content">
        <p class="slogan-top">Intelligence that Acts. Voice that Governs.</p>
        
        <h1 class="main-header">Welcome to VARAVI Global</h1>
        
        <p style="color: white; font-weight: 200; letter-spacing: 1px; margin-bottom: 40px; opacity: 0.7; font-size: 0.9rem;">
            Welcome to your automated world.
        </p>

        <button class="activate-btn">Activate Dashboard</button>
    </div>

    <script>
        const dot = document.getElementById('cursor-dot');
        let hasMoved = false;

        document.addEventListener('mousemove', (e) => {
            // Show dot only on first move
            if(!hasMoved) {
                dot.style.opacity = "1";
                hasMoved = true;
            }

            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
            
            // Subtle Dynamic Background
            const x = (e.clientX / window.innerWidth) * 10;
            const y = (e.clientY / window.innerHeight) * 10;
            document.body.style.backgroundColor = `rgb(${6 + x}, ${8 + y}, ${15})`;
        });
    </script>
</body>
</html>
