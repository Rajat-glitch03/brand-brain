<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARAVI GLOBAL | LAURA</title>
    <style>
        /* Color Palette: #FFD700 (Gold), #ffffff (White), #06080f (Deep Black) */
        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s ease; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #06080f; 
            color: #ffffff; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 1. LOGIN GATEWAY - Full Screen Overlay */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #06080f;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
        }

        .login-card {
            background: #0d1117;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #FFD700;
            text-align: center;
            width: 350px;
        }

        .login-card h1 { color: #FFD700; letter-spacing: 3px; margin-bottom: 20px; font-size: 1.5rem; }
        
        .login-card input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: #06080f; border: 1px solid #333;
            color: white; border-radius: 5px; outline: none;
        }

        .login-card button {
            width: 100%; padding: 12px; background: #FFD700;
            color: #06080f; border: none; border-radius: 5px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* 2. MAIN APP CONTAINER */
        #app-container {
            width: 95%;
            max-width: 1000px;
            height: 90vh;
            background: #0d1117;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            display: none; /* Hidden until login */
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* Header with Logo */
        header {
            padding: 20px 30px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            display: flex; align-items: center; justify-content: space-between;
        }

        .logo-box { display: flex; align-items: center; gap: 15px; }
        .logo-box img { width: 35px; height: 35px; object-fit: contain; }
        .logo-box h1 { color: #FFD700; font-size: 1.2rem; letter-spacing: 4px; }

        /* Chat Window */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg { max-width: 80%; padding: 12px 18px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; }
        .user { align-self: flex-end; background: #FFD700; color: #06080f; font-weight: 500; }
        .ai { align-self: flex-start; background: #1c2128; border: 1px solid #30363d; color: #ffffff; }

        /* Input Area */
        .input-area {
            padding: 20px 30px;
            background: #06080f;
            display: flex; gap: 15px;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
        }

        #userInput {
            flex: 1; padding: 15px; background: #1c2128;
            border: 1px solid #30363d; color: white;
            border-radius: 8px; outline: none;
        }

        #sendBtn {
            padding: 0 30px; background: #FFD700;
            color: #06080f; border-radius: 8px;
            font-weight: bold; border: none; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- 1. LOGIN SECTION -->
    <div id="login-overlay">
        <div class="login-card">
            <h1>VARAVI GLOBAL</h1>
            <input type="text" id="regName" placeholder="Your Name">
            <input type="email" id="regEmail" placeholder="Your Email">
            <input type="text" id="regCity" placeholder="Your City">
            <button onclick="login()">Initialize Laura</button>
        </div>
    </div>

    <!-- 2. CHAT SECTION -->
    <div id="app-container">
        <header>
            <div class="logo-box">
                <img src="logo.png" alt="Logo">
                <h1>VARAVI GLOBAL</h1>
            </div>
            <span style="color: #666; font-size: 0.8rem;">SYSTEM ACTIVE</span>
        </header>

        <div id="chat-window">
            <div class="msg ai">Welcome, Prince. System initialized. How shall we proceed?</div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type command...">
            <button id="sendBtn">SEND</button>
        </div>
    </div>

    <script>
        let currentUser = null;

        // Function to handle Login
        function login() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const city = document.getElementById('regCity').value;

            if (!name || !email) {
                alert("Please provide credentials.");
                return;
            }

            currentUser = { name, email, city };
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
        }

        // Function to Send Message to API
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatWindow = document.getElementById('chat-window');
            const text = input.value.trim();

            if (!text) return;

            // Add User message
            chatWindow.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: text,
                        userData: currentUser 
                    })
                });
                
                const data = await response.json();
                chatWindow.innerHTML += `<div class="msg ai">${data.reply}</div>`;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            } catch (err) {
                chatWindow.innerHTML += `<div class="msg ai">Error connecting to core. Check Vercel logs.</div>`;
            }
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
