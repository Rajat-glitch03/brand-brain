<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARAVI Global | Laura</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0a0a0a; color: #ffffff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 20px; border-bottom: 1px solid #222; text-align: center; background: #000; }
        header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; color: #00d4ff; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #111 0%, #0a0a0a 100%); }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; }
        .user { align-self: flex-end; background: #00d4ff; color: #000; font-weight: 500; }
        .ai { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; color: #eee; }
        .input-area { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; padding: 14px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; outline: none; }
        input:focus { border-color: #00d4ff; }
        button { padding: 0 24px; background: #00d4ff; border: none; color: #000; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #00b8e6; }
    </style>
</head>
<body>

    <!-- Login Overlay -->
<!-- Login Overlay -->
<div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; transition: 0.5s;">
    <h1 style="color:#00d4ff; letter-spacing:4px; margin-bottom: 10px;">VARAVI GLOBAL</h1>
    <p style="color:#888; margin-bottom: 30px;">Access the Universal Hand Interface</p>
    
    <div style="display:flex; flex-direction:column; gap:15px; width: 300px;">
        <input type="text" id="regName" placeholder="Full Name" style="padding:12px; border-radius:8px; border:1px solid #333; background:#111; color:white;">
        <input type="email" id="regEmail" placeholder="Email Address" style="padding:12px; border-radius:8px; border:1px solid #333; background:#111; color:white;">
        <input type="text" id="regCity" placeholder="City" style="padding:12px; border-radius:8px; border:1px solid #333; background:#111; color:white;">
        
        <button onclick="startExperience()" style="padding:15px; background:#00d4ff; color:#000; border-radius:8px; font-weight:bold; cursor:pointer; border:none; margin-top:10px;">
            INITIALIZE LAURA
        </button>
    </div>
</div>

    <header>
        <h1>VARAVI GLOBAL</h1>
    </header>

    <div id="chat-window">
        <div class="msg ai">Welcome back, Prince. I am Laura. How can we advance VARAVI today?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask Laura anything..." autocomplete="off">
        <button id="sendBtn">SEND</button>
    </div>

    <script>

        let currentUser = null;

function startExperience() {
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const city = document.getElementById('regCity').value;

    if (!name || !email) {
        alert("Prince, please ensure name and email are provided for VARAVI records.");
        return;
    }

    // Store the data
    currentUser = { name, email, city };

    // Hide the login screen with a fade-out
    document.getElementById('login-overlay').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('login-overlay').style.display = 'none';
    }, 500);
}
        
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        async function handleSend() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    userInput.value = '';

    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                message: text,
                userData: currentUser // This sends the name/email/city you just typed!
            })
        });
        
        const data = await response.json();
        addMessage(data.reply, 'ai');
    } catch (err) {
        addMessage("Laura is offline. Check Vercel logs.", 'ai');
    }
}

        function addMessage(text, side) {
            const div = document.createElement('div');
            div.className = `msg ${side}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
