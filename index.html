<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Assistant</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 600px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #ddd; }
        #header { background: #000; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 10px; max-width: 80%; line-height: 1.4; }
        .user { background: #007bff; color: white; align-self: flex-end; }
        .bot { background: #e9ecef; color: #333; align-self: flex-start; }
        #input-area { display: flex; border-top: 1px solid #ddd; padding: 15px; background: #fff; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 5px; outline: none; }
        button { background: #000; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #333; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">BRAND ASSISTANT</div>
    <div id="chat-box">
        <div class="message bot">Hello! I'm your brand AI. Ask me anything or test a city name!</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // --- CONFIGURATION ---
    const API_KEY = "AIzaSyBfLSEF9cmP2WedXMWjkqv7euq1gAvBXCE"; 
    const genAI = new GoogleGenerativeAI(API_KEY);
    const model = genAI.getGenerativeModel({ model: "gemini-3.1-flash-lite" });

    window.sendMessage = async function() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('chat-box');
        const userText = input.value.trim();

        if (!userText) return;

        // Show User Message
        box.innerHTML += `<div class="message user">${userText}</div>`;
        input.value = '';
        box.scrollTop = box.scrollHeight;

        try {
            // THE BRAIN LOGIC
            const prompt = `You are a helpful brand assistant. If the user provides a city name, validate it. Otherwise, answer helpfully. User: ${userText}`;
            
            const result = await model.generateContent(prompt);
            const response = await result.response;
            const botText = response.text();

            // Show Bot Message
            box.innerHTML += `<div class="message bot">${botText}</div>`;
        } catch (error) {
            box.innerHTML += `<div class="message bot">System Error: Check your API Key or Connection.</div>`;
        }
        
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
