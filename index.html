<!DOCTYPE html>
<html lang="en">
<head>
    <title>VARAVI Global | AI Interface</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px; border-radius: 15px; line-height: 1.4; }
        .user { align-self: flex-end; background: #2980b9; color: white; }
        .ai { align-self: flex-start; background: #333; border: 1px solid #444; }
        .input-area { padding: 20px; background: #1a1a1a; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; background: #2a2a2a; color: white; }
        button { padding: 10px 20px; background: #27ae60; border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="chat-window">
        <div class="message ai">Hello, I am Assistant powered by VaraviGlobal Protocal. How shall we begin our build today?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your command..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatWindow = document.getElementById('chat-window');
            if (!input.value.trim()) return;

            // Add User Message to UI
            chatWindow.innerHTML += `<div class="message user">${input.value}</div>`;
            const userText = input.value;
            input.value = '';

            try {
                // Pointing to your Vercel API route
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText })
                });
                const data = await response.json();
                
                // Add Laura's Response to UI
                chatWindow.innerHTML += `<div class="message ai">${data.reply}</div>`;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            } catch (err) {
                console.error("Connection lost:", err);
            }
        }
    </script>
</body>
</html>
