<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARAVI Global | Entry Portal</title>
    
    <!-- DM Sans for the Imperial feel -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,400;9..40,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #FFD700;
            --deep-black: #06080f;
            --pure-white: #ffffff;
            --font-main: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--deep-black);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s ease; /* For the smooth color shift */
        }

        /* The Logo Background: Fixed, Centered, and Subtle */
        .bg-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            max-width: 800px;
            opacity: 0.1; /* Barely visible for extreme luxury */
            pointer-events: none;
            z-index: 0;
        }

        /* Cursor Follower: The Golden Dot */
        #cursor-dot {
            position: fixed;
            width: 12px;
            height: 12px;
            background-color: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 20px var(--gold), 0 0 40px var(--gold);
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
        }

        /* Central Architecture */
        .portal-content {
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .welcome-msg {
            font-size: 0.9rem;
            color: var(--gold);
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .main-title {
            font-size: 5rem;
            font-weight: 200;
            letter-spacing: -2px;
            color: var(--pure-white);
            margin: 10px 0;
            line-height: 1;
        }

        .slogan {
            font-size: 1.2rem;
            color: var(--pure-white);
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        /* Activate Dashboard Button */
        .activate-btn {
    /* Layout & Typography */
    position: relative;
    padding: 22px 60px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #06080f;
    
    /* Luxury Gold Base */
    background: #FFD700;
    border: none;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    
    /* Shadow for depth */
    box-shadow: 0 0 0 0 rgba(255, 215, 0, 0);
}

.activate-btn::before {
    /* The "Power-Up" Light Sweep */
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        120deg, 
        transparent, 
        rgba(255, 255, 255, 0.6), 
        transparent
    );
    transition: all 0.6s;
}

.activate-btn:hover {
    /* The Interaction */
    transform: translateY(-5px);
    background: #ffffff; /* Shifts to pure white for elite contrast */
    color: #06080f;
    letter-spacing: 7px;
    box-shadow: 0 20px 40px rgba(255, 215, 0, 0.3);
}

.activate-btn:hover::before {
    /* Moves the light sweep across the button */
    left: 100%;
}

.activate-btn:active {
    /* Physical Press Feel */
    transform: translateY(0);
    box-shadow: 0 5px 10px rgba(255, 215, 0, 0.2);
}
        /* Screen edges vignette */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(6, 8, 15, 0.4) 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    
    <!-- Luxurious Logo Background -->
    <img src="logo1.png" class="bg-logo" alt="VARAVI Logo">

    <div class="overlay"></div>

    <div class="portal-content">
        <p class="welcome-msg">Welcome to VARAVI Global</p>
        
        <h1 class="main-title">Intelligence that Acts.<br>Voice that Governs.</h1>
        
        <p class="slogan">VaraviGlobal welcomes to your automated world.</p>

        <button class="activate-btn" onclick="location.href='/dashboard'">Activate Dashboard</button>
    </div>

    <script>
        const dot = document.getElementById('cursor-dot');
        const body = document.body;

        document.addEventListener('mousemove', (e) => {
            // Move the golden dot
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';

            // Change background colors based on cursor position
            // We shift between the deep black and a slightly more "imperial" blue/gold tint
            const xPercent = e.clientX / window.innerWidth;
            const yPercent = e.clientY / window.innerHeight;
            
            const r = Math.floor(6 + (xPercent * 10)); // Subtle shift
            const g = Math.floor(8 + (yPercent * 5));
            const b = Math.floor(15 + (xPercent * 5));
            
            body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        });

        // Click effect
        document.addEventListener('mousedown', () => {
            dot.style.transform = 'translate(-50%, -50%) scale(0.7)';
        });
        document.addEventListener('mouseup', () => {
            dot.style.transform = 'translate(-50%, -50%) scale(1)';
        });
    </script>
</body>
</html>
