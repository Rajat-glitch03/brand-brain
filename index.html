<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARAVI Global | Imperial Interface</title>
    <!-- Importing Elite Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #996515;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.2);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            color: #fff; font-family: 'Inter', sans-serif;
            overflow: hidden; /* Keep it elegant and focused */
        }

        /* Animated background pulse */
        .background-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
            z-index: -1;
        }

        /* Container for the UI */
        .container {
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .luxury-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid var(--border);
            width: 100%; max-width: 450px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            transition: transform 0.5s ease;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            letter-spacing: 10px;
            margin: 0 0 10px 0;
            font-size: 2.5rem;
        }

        p.subtitle {
            font-weight: 300;
            opacity: 0.5;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.7rem;
            margin-bottom: 40px;
        }

        /* Inputs and Buttons */
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            font-size: 0.6rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-left: 5px;
        }

        .luxury-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: #fff;
            padding: 15px 5px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .luxury-input:focus {
            border-bottom: 1px solid var(--gold);
        }

        .gold-btn {
            background: linear-gradient(45deg, var(--dark-gold), var(--gold));
            color: #000;
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            transition: 0.4s;
        }

        .gold-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body>
    <div class="background-glow"></div>

    <div class="container">
        <div class="luxury-card" id="mainCard">
            <h1>VARAVI</h1>
            <p class="subtitle">Global Intelligence 2026</p>

            <div class="input-group">
                <label>Access Key</label>
                <input type="password" class="luxury-input" placeholder="••••••••">
            </div>

            <div class="input-group">
                <label>Operational Hub</label>
                <input type="text" class="luxury-input" placeholder="e.g. Dubai, London, Tokyo">
            </div>

            <button class="gold-btn">Initialize Laura</button>
        </div>
    </div>
</body>
</html>
