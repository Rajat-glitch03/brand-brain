<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARAVI Global | Laura</title>
    <style>
    :root {
        --brand-cyan: #00d4ff;
        --dark-bg: #050505;
        --glass: rgba(255, 255, 255, 0.05);
    }

    * { box-sizing: border-box; transition: all 0.3s ease; }
    
    body { 
        font-family: 'Inter', sans-serif; 
        background: var(--dark-bg); 
        color: white; 
        margin: 0; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh;
        overflow: hidden;
    }

    /* High-End Container */
    #app-container {
        width: 95%;
        max-width: 1100px;
        height: 90vh;
        background: var(--glass);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* Branding Header */
    header {
        padding: 20px 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0,0,0,0.2);
    }

    .logo-container { display: flex; align-items: center; gap: 15px; }
    
    /* THE LOGO SPOT */
    .brand-logo {
        width: 45px; /* Adjust size as needed */
        height: 45px;
        object-fit: contain;
        border-radius: 8px;
    }

    header h1 { 
        font-size: 1.1rem; 
        letter-spacing: 4px; 
        color: var(--brand-cyan); 
        margin: 0;
        text-transform: uppercase;
    }

    /* Chat Area */
    #chat-window {
        flex: 1;
        overflow-y: auto;
        padding: 30px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        scroll-behavior: smooth;
    }

    /* Chat Bubbles */
    .msg {
        max-width: 70%;
        padding: 16px 20px;
        border-radius: 18px;
        font-size: 0.95rem;
        line-height: 1.6;
    }

    .user {
        align-self: flex-end;
        background: var(--brand-cyan);
        color: #000;
        font-weight: 500;
        border-bottom-right-radius: 4px;
    }

    .ai {
        align-self: flex-start;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.1);
        border-bottom-left-radius: 4px;
    }

    /* Modern Input */
    .input-area {
        padding: 25px 40px;
        background: rgba(0,0,0,0.3);
        display: flex;
        gap: 15px;
    }

    input {
        flex: 1;
        padding: 15px 20px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        color: white;
        outline: none;
    }

    input:focus { border-color: var(--brand-cyan); background: rgba(255,255,255,0.08); }

    button {
        padding: 0 30px;
        background: var(--brand-cyan);
        color: black;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        border: none;
    }

    button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3); }

</style>
</head>
<body>

    <div id="app-container">
    <header>
        <div class="logo-container">
            <!-- Replace 'logo.png' with your actual filename in GitHub -->
            <img src="logo.png" alt="VARAVI Logo" class="brand-logo">
            <h1>VARAVI GLOBAL</h1>
        </div>
        <div style="font-size: 0.8rem; color: #555;">SYSTEM STATUS: ACTIVE</div>
    </header>

    <div id="chat-window">
        <!-- Messages appear here -->
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Command Laura...">
        <button id="sendBtn">EXECUTE</button>
    </div>
</div>

    <!-- Login Overlay -->
<!-- Login Overlay -->
<div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; transition: 0.5s;">
    <h1 style="color:#00d4ff; letter-spacing:4px; margin-bottom: 10px;">VARAVI GLOBAL</h1>
    <p style="color:#888; margin-bottom: 30px;">Access the Universal Hand Interface</p>
    
    <div style="display:flex; flex-direction:column; gap:15px; width: 300px;">
        <input type="text" id="regName" placeholder="Full Name" style="padding:12px; border-radius:8px; border:1px solid #333; background:#111; color:white;">
        <input type="email" id="regEmail" placeholder="Email Address" style="padding:12px; border-radius:8px; border:1px solid #333; background:#111; color:white;">
        <input type="text" id="regCity" placeholder="City" style="padding:12px; border-radius:8px; border:1px solid #333; background:#111; color:white;">
        
        <button onclick="startExperience()" style="padding:15px; background:#00d4ff; color:#000; border-radius:8px; font-weight:bold; cursor:pointer; border:none; margin-top:10px;">
            INITIALIZE LAURA
        </button>
    </div>
</div>

    <header>
        <h1>VARAVI GLOBAL</h1>
    </header>

    <div id="chat-window">
        <div class="msg ai">Welcome back, Prince. I am Laura. How can we advance VARAVI today?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask Laura anything..." autocomplete="off">
        <button id="sendBtn">SEND</button>
    </div>

    <script>

        let currentUser = null;

function startExperience() {
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const city = document.getElementById('regCity').value;

    if (!name || !email) {
        alert("Prince, please ensure name and email are provided for VARAVI records.");
        return;
    }

    // Store the data
    currentUser = { name, email, city };

    // Hide the login screen with a fade-out
    document.getElementById('login-overlay').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('login-overlay').style.display = 'none';
    }, 500);
}
        
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        async function handleSend() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    userInput.value = '';

    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                message: text,
                userData: currentUser // This sends the name/email/city you just typed!
            })
        });
        
        const data = await response.json();
        addMessage(data.reply, 'ai');
    } catch (err) {
        addMessage("Laura is offline. Check Vercel logs.", 'ai');
    }
}

        function addMessage(text, side) {
            const div = document.createElement('div');
            div.className = `msg ${side}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
