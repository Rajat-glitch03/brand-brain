<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARAVI Global</title>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,400;9..40,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #FFD700;
            --deep-black: #06080f;
            --pure-white: #ffffff;
            --font-main: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%; width: 100%;
            background-color: var(--deep-black);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            touch-action: none; /* Prevents mobile jitter */
        }

        /* Subliminal Logo Background - Optimized for Mobile */
        .bg-logo {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 600px;
            opacity: 0.3; pointer-events: none; z-index: 0; zoom: 2;
        }

        /* The Golden Dot - Hidden until movement */
        #cursor-dot {
            position: fixed; width: 12px; height: 12px;
            background-color: var(--gold); border-radius: 50%;
            pointer-events: none; z-index: 9999;
            box-shadow: 0 0 20px var(--gold);
            transform: translate(-50%, -50%);
            opacity: 0; /* INVISIBLE AT START */
            transition: opacity 0.5s ease;
        }

        .portal-content {
            text-align: center; z-index: 10;
            width: 90%; max-width: 1000px;
            padding: 20px;
        }

        .welcome-msg {
            font-size: clamp(2rem, 2vw, 2rem);
            color: var(--gold); letter-spacing: 5px;
            text-transform: uppercase; font-weight: 700;
            margin-bottom: 15px;
        }

        .main-title {
            /* Responsive Font: Scales between 2.5rem and 5rem */
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 200; letter-spacing: -1px;
            color: var(--pure-white); line-height: 1.1;
            margin-bottom: 20px;
        }

        .slogan {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            color: var(--pure-white); font-weight: 300;
            letter-spacing: 1px; opacity: 0.8;
            max-width: 600px; margin: 0 auto;
        }

        /* THE IMPERIAL COMMAND BUTTON */
.activate-btn {
    /* Layout & Spacing */
    margin-top: 60px;
    padding: 18px 55px;
    
    /* Brand Colors */
    background-color: #FFD700; /* Pure VARAVI Gold */
    color: #06080f;            /* Deep Black */
    
    /* Typography */
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 5px;       /* Wide tracking for luxury feel */
    text-transform: uppercase;
    
    /* Structural Integrity */
    border: 1px solid #FFD700;
    border-radius: 0px;        /* Sharp edges only */
    cursor: pointer;
    
    /* Subtle Interaction */
    transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    position: relative;
    z-index: 2;
}

.activate-btn:hover {
    /* Instead of getting bigger, it gets cleaner */
    background-color: transparent;
    color: #FFD700;
    letter-spacing: 7px;       /* Expands slightly for 'breathing' effect */
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
}

/* Optional: Adding a very faint gold glow behind it */
.activate-btn::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0);
    transition: box-shadow 0.5s ease;
    z-index: -1;
}

.activate-btn:hover::after {
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
}

        /* Remove dot on mobile/touch screens to avoid "stuck" dot */
        @media (pointer: coarse) {
            #cursor-dot { display: none; }
        }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    
    <img src="logo1.png" class="bg-logo" alt="VARAVI">

    <div class="portal-content">
        <p class="welcome-msg">VARAVI Global</p>
        <h1 class="main-title">Intelligence that Acts.<br>Voice that Governs.</h1>
        <p class="slogan">Welcome to your automated world.</p>
        <button class="activate-btn" onclick="window.location.href='dashboard.html'">Activate Dashboard</button>
    </div>

    <script>
        const dot = document.getElementById('cursor-dot');
        const body = document.body;
        let hasMoved = false;

        document.addEventListener('mousemove', (e) => {
            // Show dot only after first movement
            if (!hasMoved) {
                dot.style.opacity = "1";
                hasMoved = true;
            }

            // Smooth dot follow
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';

            // Background dynamic shift (Subtle)
            const xShift = (e.clientX / window.innerWidth) * 10;
            const yShift = (e.clientY / window.innerHeight) * 10;
            body.style.backgroundColor = `rgb(${6 + xShift}, ${8 + yShift}, 15)`;
        });

        // Handle Window Resize to keep elements centered
        window.addEventListener('resize', () => {
            // Layout handles itself via CSS Flex and Clamp
        });
    </script>
</body>
</html>
