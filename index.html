<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARAVI Global | Laura</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0a0a0a; color: #ffffff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 20px; border-bottom: 1px solid #222; text-align: center; background: #000; }
        header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; color: #00d4ff; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #111 0%, #0a0a0a 100%); }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; }
        .user { align-self: flex-end; background: #00d4ff; color: #000; font-weight: 500; }
        .ai { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; color: #eee; }
        .input-area { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; padding: 14px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; outline: none; }
        input:focus { border-color: #00d4ff; }
        button { padding: 0 24px; background: #00d4ff; border: none; color: #000; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #00b8e6; }
    </style>
</head>
<body>

    <!-- Login Overlay -->
<div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000;">
    <h1 style="color:#00d4ff; letter-spacing:4px;">VARAVI GLOBAL</h1>
    <p style="color:#888;">Please sign in to access the Universal Hand</p>
    <!-- We will link this button to a login provider -->
    <button onclick="mockLogin()" style="padding:15px 30px; background:#fff; color:#000; border-radius:30px; font-weight:bold; cursor:pointer; border:none;">
        Continue with Google
    </button>
</div>

    <header>
        <h1>VARAVI GLOBAL</h1>
    </header>

    <div id="chat-window">
        <div class="msg ai">Welcome back, Prince. I am Laura. How can we advance VARAVI today?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask Laura anything..." autocomplete="off">
        <button id="sendBtn">SEND</button>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add user message to screen
            addMessage(text, 'user');
            userInput.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                addMessage(data.reply, 'ai');
            } catch (err) {
                addMessage("Connection error. Ensure Vercel deployment is active.", 'ai');
            }
        }

        function addMessage(text, side) {
            const div = document.createElement('div');
            div.className = `msg ${side}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
