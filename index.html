<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARAVI Global | Entrance</title>
    
    <!-- DM Sans for the Sovereign Aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,400;9..40,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #FFD700;
            --deep-black: #06080f;
            --pure-white: #ffffff;
            --font-main: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--deep-black);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s ease;
        }

        /* 
           DYNAMIC BACKGROUND: 
           Changes subtly based on cursor position via JS 
        */
        #bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(6, 8, 15, 0.8) 0%, var(--deep-black) 100%);
            z-index: 1;
        }

        /* 
           THE LOGO WATERMARK: 
           Fixed in the background for luxury depth 
        */
        .bg-logo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40vw;
            opacity: 0.1; /* Ultra-subtle luxury */
            z-index: 0;
            pointer-events: none;
        }

        /* 
           CENTRAL COMMAND CONTENT 
        */
        .content-wrap {
            text-align: center;
            z-index: 10;
            max-width: 900px;
            padding: 20px;
        }

        .slogan {
            color: var(--gold);
            font-size: 0.9rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 20px;
            display: block;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s forwards 0.5s;
        }

        h1 {
            color: var(--pure-white);
            font-size: 4.5rem;
            font-weight: 200;
            letter-spacing: -2px;
            margin-bottom: 15px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s forwards 0.8s;
        }

        .welcome-msg {
            color: var(--pure-white);
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s forwards 1.1s;
        }

        /* 
           ACTIVATE BUTTON: 
           Positioned at the very bottom middle 
        */
        .btn-container {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }

        .activate-btn {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 18px 45px;
            font-family: var(--font-main);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            opacity: 0;
            animation: fadeIn 2s forwards 1.5s;
        }

        .activate-btn:hover {
            background: var(--gold);
            color: var(--deep-black);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        /* 
           THE GOLDEN DOT (CURSOR FOLLOWER)
        */
        #cursor-dot {
            width: 8px;
            height: 8px;
            background-color: var(--gold);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 15px var(--gold), 0 0 30px var(--gold);
            transition: transform 0.1s ease-out;
            transform: translate(-50%, -50%);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <div id="bg-overlay"></div>
    
    <!-- logo.png acting as a background watermark -->
    <img src="logo1.png" alt="logo1.png" class="bg-logo">

    <div class="content-wrap">
        <span class="slogan">Intelligence that Acts. Voice that Governs.</span>
        <h1>Welcome to VARAVI Global</h1>
        <p class="welcome-msg">VaraviGlobal welcomes to your automated world.</p>
    </div>

    <div class="btn-container">
        <button class="activate-btn" onclick="startSystem()">Activate Dashboard</button>
    </div>

    <script>
        const dot = document.getElementById('cursor-dot');
        const bg = document.getElementById('bg-overlay');

        document.addEventListener('mousemove', (e) => {
            // Move the Golden Dot
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';

            // Change background colors dynamically based on mouse position
            const moveX = (e.clientX / window.innerWidth) * 20;
            const moveY = (e.clientY / window.innerHeight) * 20;
            
            // Subtle color shift logic
            bg.style.background = `radial-gradient(circle at ${e.clientX}px ${e.clientY}px, rgba(255, 215, 0, 0.07) 0%, rgba(6, 8, 15, 1) 50%)`;
        });

        function startSystem() {
            // Add your dashboard transition logic here
            alert("Sovereign Protocols Initializing...");
        }
    </script>
</body>
</html>
