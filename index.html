<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARAVI GLOBAL | THE UNIVERSAL HAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --dark: #06080f;
            --card: #0d1117;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif;
            background: var(--dark); 
            color: var(--text-main); 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- LUXURY LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a1c24 0%, #06080f 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-card {
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 2px;
            border: 1px solid var(--gold);
            text-align: center;
            width: 400px;
            box-shadow: var(--shadow);
        }

        .login-card h1 { 
            font-family: 'Cinzel', serif;
            color: var(--gold); 
            letter-spacing: 8px; 
            margin-bottom: 30px; 
            font-size: 1.8rem;
        }
        
        .login-card input {
            width: 100%; padding: 15px; margin-bottom: 20px;
            background: transparent; border: none;
            border-bottom: 1px solid #333;
            color: white; outline: none; font-size: 0.9rem;
            text-align: center;
        }
        
        .login-card input:focus { border-bottom: 1px solid var(--gold); }

        .login-card button {
            width: 100%; padding: 15px; background: transparent;
            color: var(--gold); border: 1px solid var(--gold);
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.4s;
        }

        .login-card button:hover { background: var(--gold); color: var(--dark); }

        /* --- MAIN TERMINAL UI --- */
        #app-container {
            width: 90%;
            max-width: 1100px;
            height: 85vh;
            background: var(--card);
            border: 1px solid rgba(255, 215, 0, 0.15);
            display: none; 
            flex-direction: column;
            box-shadow: var(--shadow);
            position: relative;
        }

        header {
            padding: 30px 40px;
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            display: flex; align-items: center; justify-content: space-between;
        }

        .brand-wrap { display: flex; align-items: center; gap: 20px; }
        .brand-wrap img { width: 40px; height: 40px; filter: grayscale(1) brightness(2); }
        .brand-wrap h1 { 
            font-family: 'Cinzel', serif;
            color: var(--gold); font-size: 1.3rem; letter-spacing: 5px; 
        }

        .sys-status { color: var(--gold); font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6; }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            scrollbar-width: none;
        }

        .msg { max-width: 65%; padding: 18px 24px; font-size: 0.9rem; line-height: 1.7; letter-spacing: 0.5px; }
        .user { 
            align-self: flex-end; 
            background: var(--gold); 
            color: var(--dark); 
            font-weight: 600;
            border-radius: 20px 20px 0 20px;
        }
        .ai { 
            align-self: flex-start; 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,215,0,0.1); 
            color: var(--text-main);
            border-radius: 20px 20px 20px 0;
        }

        /* --- INPUT SUITE --- */
        .input-suite {
            padding: 30px 40px;
            background: rgba(0,0,0,0.5);
            display: flex; gap: 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
        }

        #userInput {
            flex: 1; padding: 18px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); color: white;
            outline: none; font-size: 1rem;
        }

        #userInput:focus { border: 1px solid var(--gold); }

        #sendBtn {
            padding: 0 40px; background: var(--gold);
            color: #06080f; font-weight: bold; border: none; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
        }

        #sendBtn:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <!-- LUXURY LOGIN -->
    <div id="login-overlay">
        <div class="login-card">
            <h1>VARAVI GLOBAL</h1>
            <input type="text" id="regName" placeholder="CLIENT NAME">
            <input type="email" id="regEmail" placeholder="SECURE EMAIL">
            <input type="text" id="regCity" placeholder="LOCATION">
            <button onclick="initializeSystem()">Initialize Laura</button>
        </div>
    </div>

    <!-- MAIN INTERFACE -->
    <div id="app-container">
        <header>
            <div class="brand-wrap">
                <img src="logo.png" alt="VARAVI">
                <h1>VARAVI GLOBAL</h1>
            </div>
            <div class="sys-status">CONNECTION SECURE // LAURA V1.2</div>
        </header>

        <div id="chat-window">
            <div class="msg ai">Good evening. I am Laura. Your personalized VARAVI interface is ready for your command.</div>
        </div>

        <div class="input-suite">
            <input type="text" id="userInput" placeholder="Compose a command..." autocomplete="off">
            <button id="sendBtn">Execute</button>
        </div>
    </div>

    <script>

        function addMessage(text, side) {
    const div = document.createElement('div');
    div.className = `msg ${side}`;
    
    if (side === 'ai') {
        // This logic converts **bold** to <b> and ### to <h3> and \n to <br>
        let formattedText = text
            .replace(/### (.*)/g, '<h3 style="color:#FFD700; margin:10px 0;">$1</h3>')
            .replace(/\*\*(.*?)\*\*/g, '<b style="color:#FFD700;">$1</b>')
            .replace(/\n/g, '<br>');
        
        div.innerHTML = formattedText;
    } else {
        div.innerText = text;
    }

    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
}
        let currentUser = null;

        function initializeSystem() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const city = document.getElementById('regCity').value;

            if (!name || !email) {
                alert("Credentials required for VARAVI protocols.");
                return;
            }

            currentUser = { name, email, city };
            
            const overlay = document.getElementById('login-overlay');
            overlay.style.opacity = '0';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                const app = document.getElementById('app-container');
                app.style.display = 'flex';
            }, 800);
        }

        async function handleExecution() {
            const input = document.getElementById('userInput');
            const window = document.getElementById('chat-window');
            const text = input.value.trim();

            if (!text) return;

            window.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            window.scrollTop = window.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: text,
                        userData: currentUser 
                    })
                });
                
                const data = await response.json();
                window.innerHTML += `<div class="msg ai">${data.reply}</div>`;
                window.scrollTop = window.scrollHeight;
            } catch (err) {
                window.innerHTML += `<div class="msg ai">System Timeout. Verify your Vercel deployment, Prince.</div>`;
            }
        }

        document.getElementById('sendBtn').addEventListener('click', handleExecution);
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleExecution();
        });
    </script>
</body>
</html>
