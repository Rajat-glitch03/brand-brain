<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARAVI Global | Gateway</title>
    
    <!-- DM Sans for the Elite Aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,400;9..40,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #FFD700;
            --deep-black: #06080f;
            --pure-white: #ffffff;
            --font-main: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--deep-black);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none; /* Hide default cursor to show the Golden Dot */
        }

        /* 
           INTERACTIVE BACKGROUND: 
           This shifts colors based on cursor movement 
        */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), #0a0e1a 0%, #06080f 100%);
            transition: background 0.2s ease-out;
        }

        /* 
           THE GOLDEN SINGULARITY: 
           The dot that follows the cursor 
        */
        #cursor-dot {
            position: fixed;
            width: 8px;
            height: 8px;
            background-color: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 20px var(--gold), 0 0 40px var(--gold);
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
        }

        /* 
           CENTRAL COMMAND AREA 
        */
        .center-content {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .slogan {
            color: var(--gold);
            font-size: 0.9rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0;
            animation: fadeInDown 1.5s forwards;
            margin-bottom: 5px;
        }

        .welcome-title {
            color: var(--pure-white);
            font-size: 4.5rem;
            font-weight: 200;
            letter-spacing: -2px;
            line-height: 1;
            opacity: 0;
            animation: fadeIn 2s forwards 0.5s;
        }

        .sub-welcome {
            color: var(--pure-white);
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeInUp 1.5s forwards 1s;
        }

        /* 
           ACTIVATE BUTTON 
        */
        .activate-btn {
            margin-top: 60px;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 18px 45px;
            font-family: var(--font-main);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
            opacity: 0;
            animation: fadeIn 2s forwards 1.5s;
        }

        .activate-btn:hover {
            background: var(--gold);
            color: var(--deep-black);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            transform: scale(1.05);
        }

        /* ANIMATIONS */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }

    </style>
</head>
<body>

    <div id="bg-canvas"></div>
    <div id="cursor-dot"></div>

    <div class="center-content">
        <p class="slogan">Intelligence that Acts. Voice that Governs.</p>
        <h1 class="welcome-title">Welcome to VARAVI Global</h1>
        <p class="sub-welcome">VaraviGlobal welcomes to your automated world.</p>
        
        <button class="activate-btn" onclick="initializeImperialSystem()">Activate Dashboard</button>
    </div>

    <script>
        const dot = document.getElementById('cursor-dot');
        const bg = document.getElementById('bg-canvas');

        // Movement Logic
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;

            // Move the Golden Dot
            dot.style.left = x + 'px';
            dot.style.top = y + 'px';

            // Update Background Gradient Position
            const xPercent = (x / window.innerWidth) * 100;
            const yPercent = (y / window.innerHeight) * 100;
            bg.style.setProperty('--x', xPercent + '%');
            bg.style.setProperty('--y', yPercent + '%');
        });

        function initializeImperialSystem() {
            // Future logic for transition
            alert("Imperial Systems Initializing... Welcome, Prince.");
        }
    </script>
</body>
</html>
