<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARAVI Global | Entry Portal</title>
    
    <!-- DM Sans for the Imperial feel -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,400;9..40,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #FFD700;
            --deep-black: #06080f;
            --pure-white: #ffffff;
            --font-main: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--deep-black);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s ease; /* For the smooth color shift */
        }

        /* The Logo Background: Fixed, Centered, and Subtle */
        .bg-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            max-width: 800px;
            opacity: 0.1; /* Barely visible for extreme luxury */
            pointer-events: none;
            z-index: 0;
        }

        /* Cursor Follower: The Golden Dot */
        #cursor-dot {
            position: fixed;
            width: 12px;
            height: 12px;
            background-color: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 20px var(--gold), 0 0 40px var(--gold);
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
        }

        /* Central Architecture */
        .portal-content {
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .welcome-msg {
            font-size: 2rem;
            color: var(--gold);
            letter-spacing: 6px;
            font-weight: 700;
        }

        .main-title {
            font-size: 5rem;
            font-weight: 200;
            letter-spacing: -2px;
            color: var(--pure-white);
            margin: 10px 0;
            line-height: 1;
        }

        .slogan {
            font-size: 1.7rem;
            color: var(--pure-white);
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        /* Activate Dashboard Button */
        /* THE IMPERIAL COMMAND BUTTON */
.activate-btn {
    /* Layout & Spacing */
    margin-top: 60px;
    padding: 18px 55px;
    
    /* Brand Colors */
    background-color: #FFD700; /* Pure VARAVI Gold */
    color: #06080f;            /* Deep Black */
    
    /* Typography */
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 5px;       /* Wide tracking for luxury feel */
    text-transform: uppercase;
    
    /* Structural Integrity */
    border: 1px solid #FFD700;
    border-radius: 0px;        /* Sharp edges only */
    cursor: pointer;
    
    /* Subtle Interaction */
    transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    position: relative;
    z-index: 2;
}

.activate-btn:hover {
    /* Instead of getting bigger, it gets cleaner */
    background-color: transparent;
    color: #FFD700;
    letter-spacing: 7px;       /* Expands slightly for 'breathing' effect */
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
}

/* Optional: Adding a very faint gold glow behind it */
.activate-btn::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0);
    transition: box-shadow 0.5s ease;
    z-index: -1;
}

.activate-btn:hover::after {
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
}
        /* Screen edges vignette */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(6, 8, 15, 0.4) 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    
    <!-- Luxurious Logo Background -->
    <img src="logo1.png" class="bg-logo" alt="VARAVI Logo">

    <div class="overlay"></div>

    <div class="portal-content">
        <p class="welcome-msg">Welcome to VARAVI Global</p>
        
        <h1 class="main-title">Intelligence that Acts.<br>Voice that Governs.</h1>
        
        <p class="slogan">Welcome to your automated world.</p>

        <button class="activate-btn" onclick="location.href='/dashboard'">Activate Dashboard</button>
    </div>

    <script>
        const dot = document.getElementById('cursor-dot');
        const body = document.body;

        document.addEventListener('mousemove', (e) => {
            // Move the golden dot
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';

            // Change background colors based on cursor position
            // We shift between the deep black and a slightly more "imperial" blue/gold tint
            const xPercent = e.clientX / window.innerWidth;
            const yPercent = e.clientY / window.innerHeight;
            
            const r = Math.floor(6 + (xPercent * 10)); // Subtle shift
            const g = Math.floor(8 + (yPercent * 5));
            const b = Math.floor(15 + (xPercent * 5));
            
            body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        });

        // Click effect
        document.addEventListener('mousedown', () => {
            dot.style.transform = 'translate(-50%, -50%) scale(0.7)';
        });
        document.addEventListener('mouseup', () => {
            dot.style.transform = 'translate(-50%, -50%) scale(1)';
        });
    </script>
</body>
</html>
